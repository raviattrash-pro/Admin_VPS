name: Triple Database Backup & Git Archiving

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch:   # Allows you to run it manually for testing

jobs:
  sync-and-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      # 1. Export from Primary TiDB
      - name: Dump Primary Database
        run: |
          mysqldump --host=${{ secrets.PRIMARY_DB_HOST }} \
                    --port=4000 \
                    --user=${{ secrets.PRIMARY_DB_USER }} \
                    --password=${{ secrets.PRIMARY_DB_PASS }} \
                    --ssl-mode=VERIFY_IDENTITY \
                    --databases library_app > backup.sql

      # 2. Push to Aiven Secondary
      - name: Sync to Aiven
        run: |
          mysql --host=${{ secrets.AIVEN_DB_HOST }} \
                --port=${{ secrets.AIVEN_DB_PORT }} \
                --user=${{ secrets.AIVEN_DB_USER }} \
                --password=${{ secrets.AIVEN_DB_PASS }} \
                --ssl-mode=REQUIRED library_app < backup.sql

      # 3. Push to TiDB Ternary (Different Region)
      - name: Sync to TiDB Ternary
        run: |
          mysql --host=${{ secrets.TERNARY_DB_HOST }} \
                --port=4000 \
                --user=${{ secrets.TERNARY_DB_USER }} \
                --password=${{ secrets.TERNARY_DB_PASS }} \
                --ssl-mode=VERIFY_IDENTITY library_app < backup.sql

      # 4. Commit .sql file to Git
      - name: Archive SQL in Git
        run: |
          mkdir -p backups
          cp backup.sql backups/db_backup_$(date +%Y-%m-%d).sql
          git config --global user.name "Backup Bot"
          git config --global user.email "backup-bot@github.com"
          git add backups/
          git commit -m "Automated DB Backup - $(date +%Y-%m-%d)"
          git push