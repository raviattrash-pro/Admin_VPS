name: Triple DB Backup & Git Archive

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:      # Allows manual testing via the "Actions" tab

jobs:
  database-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install MySQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      # 1. DUMP FROM PRIMARY (TiDB)
      # Fix: Changed to --ssl-mode=REQUIRED to solve the CA cert error
      - name: Export from Primary (test)
        run: |
          mysqldump --host=${{ secrets.PRIMARY_DB_HOST }} \
                    --port=4000 \
                    --user=${{ secrets.PRIMARY_DB_USER }} \
                    --password=${{ secrets.PRIMARY_DB_PASS }} \
                    --ssl-mode=REQUIRED \
                    --databases test > backup.sql

      # 2. SYNC TO SECONDARY (Aiven)
      - name: Import to Secondary (defaultdb)
        run: |
          mysql --host=${{ secrets.AIVEN_DB_HOST }} \
                --port=${{ secrets.AIVEN_DB_PORT }} \
                --user=${{ secrets.AIVEN_DB_USER }} \
                --password=${{ secrets.AIVEN_DB_PASS }} \
                --ssl-mode=REQUIRED defaultdb < backup.sql

      # 3. SYNC TO TERNARY (TiDB Cluster 2)
      # Fix: Changed to --ssl-mode=REQUIRED for consistency
      - name: Import to Ternary (sys)
        run: |
          mysql --host=${{ secrets.TERNARY_DB_HOST }} \
                --port=4000 \
                --user=${{ secrets.TERNARY_DB_USER }} \
                --password=${{ secrets.TERNARY_DB_PASS }} \
                --ssl-mode=REQUIRED sys < backup.sql

      # 4. SAVE .SQL FILE TO GITHUB REPO
      - name: Commit and Push SQL to Git
        run: |
          mkdir -p db-backups
          # Save dated file
          cp backup.sql db-backups/backup-$(date +%Y-%m-%d).sql
          # Update latest file
          mv backup.sql db-backups/latest_backup.sql
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add db-backups/
          git commit -m "Automated DB Backup: $(date +%Y-%m-%d)"
          git push