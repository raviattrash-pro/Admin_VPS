name: Render Keep-Alive (Daytime Only)

on:
  schedule:
    # Runs every 10 minutes between 00:00 and 15:00 UTC
    # This equals ~5:30 AM to 8:30 PM IST
    - cron: '*/10 0-15 * * *'
  workflow_dispatch:
    # Manual trigger for testing

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Send Heartbeat Ping
        run: |
          # Removed -f to stop exit code 22 errors
          # Added -L to follow redirects
          curl -s -L https://admin-vps.onrender.com > /dev/null
          echo "Daytime ping sent at $(date)"
