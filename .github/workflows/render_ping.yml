name: Render Keep-Alive

on:
  schedule:
    # Runs every 10 mins from ~5:30 AM to 8:30 PM IST (0-15 UTC)
    - cron: '*/10 0-15 * * *'
  workflow_dispatch:
    inputs:
      clear_all:
        description: 'Set to "true" to wipe ALL history now'
        required: false
        default: 'false'

jobs:
  ping-render:
    # Only run the ping if we ARE NOT doing a manual "Clear All"
    if: github.event.inputs.clear_all != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send Heartbeat Ping
        run: |
          curl -s -L https://admin-vps.onrender.com > /dev/null
          echo "Daytime ping sent at $(date)"

  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete History
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event.inputs.clear_all }}" == "true" ]; then
            echo "Wiping ALL workflow history..."
            gh run list --workflow "Render Keep-Alive" --json databaseId --jq '.[].databaseId' | xargs -I {} gh run delete {}
          else
            echo "Cleaning logs older than 24 hours..."
            gh run list --workflow "Render Keep-Alive" --created "<$(date -d '1 day ago' -Iseconds)" --json databaseId --jq '.[].databaseId' | xargs -I {} gh run delete {}
          fi
