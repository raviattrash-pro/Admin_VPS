name: Render Keep-Alive

on:
  schedule:
    # Changed to 14 minutes to stay safely ahead of Render's 15-minute spin-down
    - cron: '*/14 * * * *'
  workflow_dispatch:
    # Allows you to test it manually from the Actions tab

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Send Heartbeat Ping
        run: |
          # Removed -f (fail) so the workflow doesn't crash if the site is waking up
          # Added -L (location) to follow any HTTPS or domain redirects
          curl -s -L https://admin-vps.onrender.com > /dev/null
          echo "Ping attempt completed at $(date)"