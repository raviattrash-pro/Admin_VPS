# Application Configuration
spring.application.name=vps-backend
server.port=${PORT:8080}

# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vps_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:ravi@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Path Matching (Fix for Spring Boot 3 SPA routing)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=./uploads

# JWT
jwt.secret=VisionPublicSchoolSecretKeyForJWTTokenGeneration2024VPSAdmin
jwt.expiration=86400000
